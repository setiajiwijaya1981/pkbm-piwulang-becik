<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PKBM Piwulang Becik — Sistem Monitoring</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --hijau: #2D6A4F;
    --hijau-muda: #40916C;
    --hijau-terang: #74C69D;
    --hijau-pucat: #D8F3DC;
    --kuning: #F4A261;
    --kuning-muda: #FFDDD2;
    --merah: #E76F51;
    --biru: #2196F3;
    --biru-muda: #E3F2FD;
    --putih: #FAFAF8;
    --abu: #F4F4F0;
    --abu-gelap: #8B8B7A;
    --teks: #1A1A14;
    --teks-muda: #5C5C4A;
    --border: #E0E0D4;
    --shadow: 0 2px 12px rgba(45,106,79,0.08);
    --shadow-lg: 0 8px 32px rgba(45,106,79,0.12);
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--abu); color:var(--teks); min-height:100vh; }

  /* ───── LOGIN ───── */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 50%, #40916C 100%);
    position:relative; overflow:hidden;
  }
  #login-screen::before {
    content:''; position:absolute; top:-100px; right:-100px;
    width:400px; height:400px; border-radius:50%;
    background:rgba(116,198,157,0.15); pointer-events:none;
  }
  #login-screen::after {
    content:''; position:absolute; bottom:-80px; left:-80px;
    width:300px; height:300px; border-radius:50%;
    background:rgba(244,162,97,0.1); pointer-events:none;
  }
  .login-card {
    background:var(--putih); border-radius:24px; padding:48px 40px;
    width:100%; max-width:440px; box-shadow:0 24px 64px rgba(0,0,0,0.2);
    position:relative; z-index:1;
  }
  .login-logo { text-align:center; margin-bottom:32px; }
  .login-logo .logo-icon {
    width:72px; height:72px; border-radius:20px;
    background:linear-gradient(135deg,var(--hijau),var(--hijau-muda));
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 16px; font-size:32px; box-shadow:0 8px 24px rgba(45,106,79,0.3);
  }
  .login-logo h1 { font-family:'Fraunces',serif; font-size:22px; color:var(--hijau); font-weight:700; }
  .login-logo p { font-size:13px; color:var(--abu-gelap); margin-top:4px; }
  .login-tabs { display:flex; background:var(--abu); border-radius:10px; padding:4px; margin-bottom:28px; gap:4px; }
  .login-tab {
    flex:1; padding:8px; text-align:center; border:none; background:none;
    border-radius:7px; font-size:13px; font-weight:500; color:var(--teks-muda);
    cursor:pointer; transition:all .2s; font-family:'Plus Jakarta Sans',sans-serif;
  }
  .login-tab.active { background:var(--putih); color:var(--hijau); font-weight:600; box-shadow:var(--shadow); }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:13px; font-weight:600; color:var(--teks); margin-bottom:7px; }
  .form-input {
    width:100%; padding:12px 16px; border:2px solid var(--border); border-radius:10px;
    font-size:14px; font-family:'Plus Jakarta Sans',sans-serif; color:var(--teks);
    background:var(--putih); transition:border-color .2s; outline:none;
  }
  .form-input:focus { border-color:var(--hijau-muda); }
  .btn-login {
    width:100%; padding:14px; background:linear-gradient(135deg,var(--hijau),var(--hijau-muda));
    color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600;
    font-family:'Plus Jakarta Sans',sans-serif; cursor:pointer; transition:all .2s;
    box-shadow:0 4px 16px rgba(45,106,79,0.3); margin-top:8px;
  }
  .btn-login:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(45,106,79,0.4); }
  .demo-accounts { margin-top:24px; padding-top:24px; border-top:1px solid var(--border); }
  .demo-accounts p { font-size:12px; color:var(--abu-gelap); margin-bottom:10px; text-align:center; font-weight:500; }
  .demo-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .demo-btn {
    padding:8px 10px; border:1.5px solid var(--border); border-radius:8px;
    background:var(--abu); font-size:12px; cursor:pointer; transition:all .2s;
    font-family:'Plus Jakarta Sans',sans-serif; color:var(--teks-muda); font-weight:500;
  }
  .demo-btn:hover { border-color:var(--hijau-muda); color:var(--hijau); background:var(--hijau-pucat); }

  /* ───── APP SHELL ───── */
  #app { display:none; min-height:100vh; }
  .app-layout { display:flex; min-height:100vh; }

  /* ───── SIDEBAR ───── */
  .sidebar {
    width:260px; background:linear-gradient(180deg, #1B4332 0%, #2D6A4F 100%);
    color:#fff; display:flex; flex-direction:column; position:fixed;
    top:0; left:0; height:100vh; z-index:100; transition:transform .3s;
  }
  .sidebar-header { padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.1); }
  .sidebar-logo { display:flex; align-items:center; gap:12px; }
  .sidebar-logo .s-icon {
    width:40px; height:40px; border-radius:10px;
    background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .sidebar-logo .s-text h2 { font-family:'Fraunces',serif; font-size:15px; font-weight:700; line-height:1.2; }
  .sidebar-logo .s-text p { font-size:11px; opacity:0.6; margin-top:2px; }
  .sidebar-user { padding:16px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,0.1); }
  .user-avatar {
    width:38px; height:38px; border-radius:50%; background:var(--hijau-terang);
    display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }
  .user-info h3 { font-size:13px; font-weight:600; }
  .user-info p { font-size:11px; opacity:0.6; margin-top:1px; }
  .sidebar-nav { flex:1; overflow-y:auto; padding:12px 12px; }
  .nav-section { margin-bottom:20px; }
  .nav-section-label { font-size:10px; font-weight:700; letter-spacing:1.2px; opacity:0.4; text-transform:uppercase; padding:0 8px; margin-bottom:6px; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
    cursor:pointer; transition:all .2s; font-size:13.5px; font-weight:500; color:rgba(255,255,255,0.75);
    margin-bottom:2px;
  }
  .nav-item:hover { background:rgba(255,255,255,0.1); color:#fff; }
  .nav-item.active { background:rgba(255,255,255,0.18); color:#fff; font-weight:600; }
  .nav-item .nav-icon { font-size:16px; width:20px; text-align:center; }
  .nav-badge { margin-left:auto; background:var(--kuning); color:var(--teks); font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }
  .sidebar-footer { padding:16px 20px; border-top:1px solid rgba(255,255,255,0.1); }
  .btn-logout {
    width:100%; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.75); border-radius:8px; cursor:pointer; font-size:13px;
    font-family:'Plus Jakarta Sans',sans-serif; transition:all .2s;
  }
  .btn-logout:hover { background:rgba(231,111,81,0.3); color:#fff; border-color:transparent; }

  /* ───── MAIN ───── */
  .main-content { margin-left:260px; flex:1; padding:28px 32px; min-height:100vh; }
  .page-header { margin-bottom:28px; }
  .page-header h1 { font-family:'Fraunces',serif; font-size:28px; font-weight:700; color:var(--teks); }
  .page-header p { font-size:14px; color:var(--teks-muda); margin-top:4px; }
  .page-header-row { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:16px; }

  /* ───── CARDS & STATS ───── */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
  .stat-card {
    background:var(--putih); border-radius:var(--radius); padding:20px;
    box-shadow:var(--shadow); display:flex; align-items:center; gap:16px;
    border:1px solid var(--border); transition:transform .2s;
  }
  .stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
  .stat-icon { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .stat-info h3 { font-size:24px; font-weight:700; color:var(--teks); }
  .stat-info p { font-size:12px; color:var(--abu-gelap); margin-top:2px; font-weight:500; }
  .card {
    background:var(--putih); border-radius:var(--radius); padding:24px;
    box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .card-title { font-family:'Fraunces',serif; font-size:17px; font-weight:600; color:var(--teks); }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }

  /* ───── BADGES / STATUS ───── */
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-bm { background:#F5F5F5; color:#888; }
  .badge-sb { background:#FFF3CD; color:#856404; }
  .badge-ts { background:#FFF0E6; color:#C44B00; }
  .badge-t  { background:var(--hijau-pucat); color:var(--hijau); }
  .badge-admin { background:#E8EAF6; color:#3949AB; }
  .badge-tutor { background:#E0F7FA; color:#00695C; }
  .badge-siswa { background:var(--hijau-pucat); color:var(--hijau); }
  .badge-staff { background:var(--kuning-muda); color:#C44B00; }

  /* ───── TABLE ───── */
  .table-wrap { overflow-x:auto; border-radius:var(--radius-sm); border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  thead { background:var(--abu); }
  th { padding:12px 14px; text-align:left; font-weight:600; color:var(--teks-muda); font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  td { padding:13px 14px; border-top:1px solid var(--border); color:var(--teks); vertical-align:middle; }
  tr:hover td { background:var(--hijau-pucat); }
  .btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; font-family:'Plus Jakarta Sans',sans-serif; transition:all .2s; }
  .btn-primary { background:var(--hijau); color:#fff; }
  .btn-primary:hover { background:var(--hijau-muda); }
  .btn-sm { padding:5px 12px; font-size:12px; }
  .btn-outline { background:none; border:1.5px solid var(--border); color:var(--teks-muda); }
  .btn-outline:hover { border-color:var(--hijau); color:var(--hijau); }
  .btn-danger { background:#FEECEC; color:var(--merah); border:1.5px solid #FECACA; }

  /* ───── PROGRESS ───── */
  .progress-bar { background:var(--abu); border-radius:20px; height:8px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:20px; background:linear-gradient(90deg,var(--hijau),var(--hijau-terang)); transition:width .6s; }
  .progress-fill.orange { background:linear-gradient(90deg,var(--kuning),#F8C471); }
  .progress-fill.red { background:linear-gradient(90deg,var(--merah),#F1948A); }

  /* ───── NOTIF ───── */
  .notif-item { display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--border); }
  .notif-item:last-child { border-bottom:none; }
  .notif-dot { width:10px; height:10px; border-radius:50%; background:var(--hijau-muda); flex-shrink:0; margin-top:5px; }
  .notif-dot.unread { background:var(--kuning); }
  .notif-dot.info { background:var(--biru); }
  .notif-text { font-size:13.5px; color:var(--teks); line-height:1.5; }
  .notif-time { font-size:11px; color:var(--abu-gelap); margin-top:3px; }

  /* ───── MODAL ───── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--putih); border-radius:20px; width:100%; max-width:540px;
    max-height:90vh; overflow-y:auto; padding:32px; box-shadow:0 24px 64px rgba(0,0,0,0.2);
  }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .modal-header h2 { font-family:'Fraunces',serif; font-size:20px; font-weight:700; }
  .modal-close { width:32px; height:32px; border-radius:8px; border:none; background:var(--abu); cursor:pointer; font-size:16px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  select.form-input { cursor:pointer; }
  textarea.form-input { resize:vertical; min-height:80px; }

  /* ───── TABS (page) ───── */
  .page-tabs { display:flex; gap:4px; background:var(--abu); border-radius:10px; padding:4px; margin-bottom:24px; width:fit-content; }
  .page-tab {
    padding:9px 20px; border-radius:7px; border:none; background:none;
    font-size:13.5px; font-weight:500; color:var(--teks-muda); cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif; transition:all .2s;
  }
  .page-tab.active { background:var(--putih); color:var(--hijau); font-weight:600; box-shadow:var(--shadow); }

  /* ───── ATP TRACKER ───── */
  .atp-subject { background:var(--putih); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; margin-bottom:16px; }
  .atp-subject-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; cursor:pointer; user-select:none;
  }
  .atp-subject-header:hover { background:var(--abu); }
  .atp-subject-title { display:flex; align-items:center; gap:12px; }
  .atp-subject-icon { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .atp-list { padding:0 20px 16px; border-top:1px solid var(--border); }
  .atp-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border-radius:8px; margin-top:8px;
    background:var(--abu); gap:12px; flex-wrap:wrap;
  }
  .atp-row-left { flex:1; min-width:200px; }
  .atp-row-left p { font-size:13px; font-weight:500; color:var(--teks); }
  .atp-row-left span { font-size:11px; color:var(--abu-gelap); }
  .atp-row-right { display:flex; gap:8px; align-items:center; }
  .status-select {
    padding:5px 10px; border-radius:6px; border:1.5px solid var(--border);
    font-size:12px; font-family:'Plus Jakarta Sans',sans-serif; cursor:pointer; background:var(--putih);
  }

  /* ───── CHAT ───── */
  .chat-layout { display:grid; grid-template-columns:280px 1fr; gap:20px; height:600px; }
  .chat-list { border:1px solid var(--border); border-radius:var(--radius); overflow-y:auto; }
  .chat-person {
    display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer;
    border-bottom:1px solid var(--border); transition:background .15s;
  }
  .chat-person:hover, .chat-person.active { background:var(--hijau-pucat); }
  .chat-avatar { width:40px; height:40px; border-radius:50%; background:var(--hijau-terang); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
  .chat-person-info h4 { font-size:13.5px; font-weight:600; }
  .chat-person-info p { font-size:12px; color:var(--abu-gelap); margin-top:2px; }
  .chat-unread { margin-left:auto; background:var(--hijau); color:#fff; font-size:10px; font-weight:700; padding:2px 7px; border-radius:20px; }
  .chat-window { border:1px solid var(--border); border-radius:var(--radius); display:flex; flex-direction:column; overflow:hidden; }
  .chat-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--putih); }
  .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; background:var(--abu); }
  .msg { max-width:70%; }
  .msg.sent { align-self:flex-end; }
  .msg.recv { align-self:flex-start; }
  .msg-bubble { padding:10px 14px; border-radius:14px; font-size:13.5px; line-height:1.5; }
  .msg.sent .msg-bubble { background:var(--hijau); color:#fff; border-bottom-right-radius:4px; }
  .msg.recv .msg-bubble { background:var(--putih); color:var(--teks); border-bottom-left-radius:4px; box-shadow:var(--shadow); }
  .msg-time { font-size:11px; color:var(--abu-gelap); margin-top:4px; text-align:right; }
  .chat-input-area { padding:14px 16px; border-top:1px solid var(--border); display:flex; gap:10px; background:var(--putih); }
  .chat-input { flex:1; padding:10px 14px; border:1.5px solid var(--border); border-radius:24px; font-size:13.5px; font-family:'Plus Jakarta Sans',sans-serif; outline:none; }
  .chat-input:focus { border-color:var(--hijau-muda); }
  .btn-send { width:40px; height:40px; border-radius:50%; background:var(--hijau); border:none; cursor:pointer; color:#fff; font-size:16px; flex-shrink:0; transition:background .2s; }
  .btn-send:hover { background:var(--hijau-muda); }

  /* ───── PROFILE TAG ───── */
  .role-tag { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:700; }

  /* ───── MISC ───── */
  .empty-state { text-align:center; padding:48px 20px; color:var(--abu-gelap); }
  .empty-state .e-icon { font-size:48px; margin-bottom:12px; opacity:0.4; }
  .divider { height:1px; background:var(--border); margin:20px 0; }
  .hidden { display:none !important; }
  .text-sm { font-size:13px; color:var(--teks-muda); }
  .font-bold { font-weight:700; }
  .mt-1 { margin-top:4px; } .mt-2 { margin-top:8px; } .mt-3 { margin-top:16px; } .mt-4 { margin-top:24px; }
  .flex { display:flex; } .items-center { align-items:center; } .gap-2 { gap:8px; } .gap-3 { gap:12px; }
  .color-hijau { color:var(--hijau); }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; }
  .chip-green { background:var(--hijau-pucat); color:var(--hijau); }
  .chip-yellow { background:var(--kuning-muda); color:#C44B00; }
  .chip-gray { background:var(--abu); color:var(--abu-gelap); }

  @media(max-width:900px){
    .sidebar { transform:translateX(-100%); }
    .main-content { margin-left:0; padding:20px 16px; }
    .grid-2,.grid-3 { grid-template-columns:1fr; }
    .chat-layout { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════ LOGIN SCREEN ═══════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🌱</div>
      <h1>Piwulang Becik</h1>
      <p>Pusat Kegiatan Belajar Masyarakat</p>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('admin')">Admin</button>
      <button class="login-tab" onclick="switchLoginTab('tutor')">Tutor</button>
      <button class="login-tab" onclick="switchLoginTab('siswa')">Siswa</button>
      <button class="login-tab" onclick="switchLoginTab('staff')">Staff</button>
    </div>
    <div class="form-group">
      <label>Username / Email</label>
      <input class="form-input" id="login-user" type="text" placeholder="Masukkan username..." value="admin">
    </div>
    <div class="form-group">
      <label>Kata Sandi</label>
      <input class="form-input" id="login-pass" type="password" placeholder="Masukkan kata sandi..." value="admin123">
    </div>
    <button class="btn-login" onclick="doLogin()">Masuk →</button>
    <div class="demo-accounts">
      <p>✨ Demo cepat — klik untuk login langsung:</p>
      <div class="demo-grid">
        <button class="demo-btn" onclick="quickLogin('admin')">👨‍💼 Admin</button>
        <button class="demo-btn" onclick="quickLogin('tutor')">👩‍🏫 Bu Ratna (Tutor)</button>
        <button class="demo-btn" onclick="quickLogin('siswa')">🧑‍🎓 Budi (Siswa)</button>
        <button class="demo-btn" onclick="quickLogin('staff')">👔 Staff</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════ APP ═══════════════════════════ -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="s-icon">🌱</div>
          <div class="s-text">
            <h2>Piwulang Becik</h2>
            <p>Sistem Monitoring</p>
          </div>
        </div>

let activeLoginRole = 'admin';
function switchLoginTab(role) {
  activeLoginRole = role;
  document.querySelectorAll('.login-tab').forEach((t,i)=>{
    t.classList.toggle('active', ['admin','tutor','siswa','staff'][i]===role);
  });
}
function quickLogin(role) {
  currentUser = { ...USERS[role], key:role };
  showApp();
}
function doLogin() {
  currentUser = { ...USERS[activeLoginRole], key:activeLoginRole };
  showApp();
}
function doLogout() {
  currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
function showApp() {
  document.getElementById('login-screen').style.display='none';

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  const cfg = NAV_CONFIG[currentUser.key] || [];
  nav.innerHTML = cfg.map(section=>`
    <div class="nav-section">
      <div class="nav-section-label">${section.section}</div>
      ${section.items.map(item=>`
        <div class="nav-item" id="nav-${item.id}" onclick="navigate('${item.id}')">
          <span class="nav-icon">${item.icon}</span>
          <span>${item.label}</span>
          ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('nav-'+page);
  if(el) el.classList.add('active');
  const main = document.getElementById('main-content');
  const role = currentUser.key;
  if(page==='dashboard') main.innerHTML = renderDashboard(role);
  else if(page==='siswa') main.innerHTML = renderSiswa();
  else if(page==='tutor') main.innerHTML = renderTutor();
  else if(page==='kurikulum') main.innerHTML = renderKurikulum();
  else if(page==='atp-tracker') main.innerHTML = renderATPTracker(role);
  else if(page==='penilaian') main.innerHTML = renderPenilaian(role);
  else if(page==='laporan') main.innerHTML = renderLaporan();
  else if(page==='notifikasi') main.innerHTML = renderNotifikasi();
  else if(page==='pesan') main.innerHTML = renderPesan(role);
  else if(page==='nilai-saya') main.innerHTML = renderNilaiSiswa();
  else if(page==='log-belajar') main.innerHTML = renderLogBelajar();
}

                <td><strong>${a.ikon} ${a.mapel}</strong></td>
                <td>${a.items.length}</td>
                <td>${a.items.filter(i=>i.status==='T').length}</td>
                <td>77</td>
                <td>2 siswa</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function switchLaporanTab(tab) {
  ['bulanan','siswa','mapel'].forEach(t=>{
    document.getElementById('lap-'+t).classList.toggle('hidden', t!==tab);
    document.getElementById('ltab-'+t).classList.toggle('active', t===tab);
  });
}

let activeChatPerson = 'Bu Ratna';
function renderPesan(role) {
  const isSiswa = role === 'siswa';
  const contacts = isSiswa
    ? [
        { name:'Bu Ratna', sub:'Tutor Pembimbing', avatar:'👩‍🏫', unread:1 },
        { name:'Admin PKBM', sub:'Administrasi', avatar:'👨‍💼', unread:0 },
      ]
    : [
        { name:'Budi Santoso', sub:'Siswa · Fase A', avatar:'🧑‍🎓', unread:0 },
        { name:'Ani Rahayu',   sub:'Siswa · Fase A', avatar:'🧑‍🎓', unread:0 },
        { name:'Deni Firmansyah', sub:'Siswa · Fase C', avatar:'🧑‍🎓', unread:1 },
        { name:'Bu Ratna',    sub:'Tutor',    avatar:'👩‍🏫', unread:0 },
      ];

  const msgs = DATA.chat[activeChatPerson] || [];
  return `
  <div class="page-header"><h1>Pesan</h1><p>Komunikasi antara tutor dan peserta didik</p></div>
  <div class="chat-layout">
    <div class="chat-list">
      ${contacts.map(c=>`
        <div class="chat-person ${activeChatPerson===c.name?'active':''}" onclick="openChat('${c.name}')">
          <div class="chat-avatar">${c.avatar}</div>
          <div class="chat-person-info">
            <h4>${c.name}</h4>
            <p>${c.sub}</p>
          </div>
          ${c.unread?`<span class="chat-unread">${c.unread}</span>`:''}
        </div>
      `).join('')}
    </div>
    <div class="chat-window">
      <div class="chat-header">
        <div class="chat-avatar">${contacts.find(c=>c.name===activeChatPerson)?.avatar||'💬'}</div>
        <div><strong>${activeChatPerson}</strong><br><span style="font-size:12px;color:var(--abu-gelap)">Online</span></div>
      </div>
      <div class="chat-messages" id="chat-messages">
        ${msgs.length===0?`<div class="empty-state"><div class="e-icon">💬</div><p>Belum ada pesan. Mulai percakapan!</p></div>`:''}
        ${msgs.map(m=>`
          <div class="msg ${m.from==='me'?'sent':'recv'}">
            <div class="msg-bubble">${m.text}</div>
            <div class="msg-time">${m.time}</div>
          </div>
        `).join('')}
      </div>
      <div class="chat-input-area">
        <input class="chat-input" id="chat-input" placeholder="Tulis pesan..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="btn-send" onclick="sendMsg()">➤</button>
      </div>
    </div>
  </div>`;
}

function openChat(name) {
  activeChatPerson = name;
  navigate('pesan');
}
function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;
  if(!DATA.chat[activeChatPerson]) DATA.chat[activeChatPerson]=[];
  const now = new Date();
  DATA.chat[activeChatPerson].push({ from:'me', text, time:`${now.getHours().toString().padStart(2,'0')}.${now.getMinutes().toString().padStart(2,'0')}` });
  inp.value='';
  navigate('pesan');
  setTimeout(()=>{
    const cm = document.getElementById('chat-messages');
    if(cm) cm.scrollTop=cm.scrollHeight;
  },50);
}

    <div class="stat-card"><div class="stat-icon" style="background:#FFF3E0">✅</div><div class="stat-info"><h3>3</h3><p>Penilaian Selesai</p></div></div>

              <td><span class="badge ${n.kktp==='Melampaui'||n.kktp==='Tercapai'?'badge-t':n.kktp.includes('Sebagian')?'badge-ts':'badge-bm'}">${n.kktp}</span></td>

function renderLogBelajar() {
  return `
  <div class="page-header-row">
    <div class="page-header"><h1>Log Belajar</h1><p>Catat kegiatan dan refleksi belajarmu setiap hari</p></div>
    <button class="btn btn-primary" onclick="tambahLog()">+ Tambah Log</button>
  </div>
  <div id="log-list">
    ${DATA.logBelajar.map((l,i)=>`
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-size:24px;">📓</div>
            <div>
              <div style="font-weight:600;font-size:14px;">${l.mapel} — ${l.atp}</div>
              <div style="font-size:12px;color:var(--abu-gelap)">${l.tanggal} · Durasi: ${l.durasi}</div>
            </div>
          </div>
          <button class="btn btn-sm btn-danger" onclick="hapusLog(${i})">Hapus</button>
        </div>
        <div style="background:var(--abu);border-radius:8px;padding:12px;font-size:13.5px;color:var(--teks);font-style:italic;">"${l.refleksi}"</div>
      </div>
    `).join('')}
  </div>`;
}

function tambahLog() {
  const mapel = prompt('Mata Pelajaran:','Pancasila');
  if(!mapel) return;
  const refleksi = prompt('Refleksi belajar hari ini:','');
  if(!refleksi) return;
  DATA.logBelajar.unshift({ tanggal: new Date().toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}), mapel, atp:'ATP-Baru', durasi:'60 mnt', refleksi });
  navigate('log-belajar');
}
function hapusLog(i) {
  if(confirm('Hapus log ini?')) { DATA.logBelajar.splice(i,1); navigate('log-belajar'); }
}

// ═══════════════════════════════════════════════════════
//  MODALS & FORM ACTIONS
// ═══════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function saveSiswa() {
  const nama = document.getElementById('f-nama').value.trim();
  if(!nama){ alert('Nama wajib diisi!'); return; }
  DATA.siswa.push({
    id: DATA.siswa.length+1, nama,
    nisn: document.getElementById('f-nisn').value||'-',
    paket: document.getElementById('f-paket').value,
    fase: document.getElementById('f-fase').value,
    tutor: document.getElementById('f-tutor').value,
    hp: document.getElementById('f-hp').value||'-',
    progress: 0
  });
  closeModal('modal-siswa');
  navigate('siswa');
}
function hapusSiswa(id) {
  if(confirm('Hapus data siswa ini?')) {
    const idx = DATA.siswa.findIndex(s=>s.id===id);
    if(idx>=0) { DATA.siswa.splice(idx,1); navigate('siswa'); }
  }
}
function saveTutor() {
  const nama = document.getElementById('t-nama').value.trim();
  if(!nama){ alert('Nama wajib diisi!'); return; }
  DATA.tutors.push({
    id: DATA.tutors.length+1, nama,
    nuptk: document.getElementById('t-nuptk').value||'-',
    mapel: document.getElementById('t-mapel').value,
    hp: document.getElementById('t-hp').value||'-',
    siswa: 0
  });
  closeModal('modal-tutor');
  navigate('tutor');
}
function saveNilai() {
  const nilai = parseInt(document.getElementById('n-nilai').value);
  if(!nilai){ alert('Nilai wajib diisi!'); return; }
  DATA.nilai.unshift({
    siswa: document.getElementById('n-siswa').value,
    mapel: document.getElementById('n-mapel').value,
    atp: document.getElementById('n-atp').value.split('–')[0].trim(),
    jenis: document.getElementById('n-jenis').value,
    nilai,
    kktp: document.getElementById('n-kktp').value.split('(')[0].trim(),
    catatan: document.getElementById('n-catatan').value||'-'
  });
  closeModal('modal-nilai');
  navigate('penilaian');
}

// Close modal on outside click
document.addEventListener('click', e=>{
  if(e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});
</script>
